name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"
      timezone: "Europe/Stockholm"

jobs:
  renovate:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Renovate
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
        run: docker compose run --rm renovate
